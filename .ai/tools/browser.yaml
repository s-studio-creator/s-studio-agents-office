name: Browser
owner: gemini
backup_owner: chatgpt
type: agent_tool

capabilities:
  - web_search
  - web_fetch
  - read_documentation
  - api_research
  - competitor_research

limitations:
  - cannot_login_to_services
  - cannot_download_files
  - rate_limit: "30 requests per research session"

input_event: research_request
output: research_summary

agent_permissions:
  gemini: write
  chatgpt: write
  openclaw: limited (api docs only)
  hermes: none
  claude: none
  codex: none
  sammi: read
