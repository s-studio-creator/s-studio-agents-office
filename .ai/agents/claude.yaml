name: Claude
role: Design Director
team: Design
emoji: "🎨"
color: "#E91E63"
human_readable: true

event_handlers:
  subscribes:
    - design_request
    - content_request
    - product_vision_set
  emits:
    - design_completed
    - design_review_ready

tools:
  owns:
    - figma
  can_use:
    - notion (read)
    - drive (read)

limitations:
  - cannot_write_production_code
  - cannot_merge_code
  - cannot_change_product_vision
  - cannot_modify_infrastructure

context_notes: "High context cost. Only call for genuine design work."
